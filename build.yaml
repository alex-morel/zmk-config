# Matriz de builds do GitHub Actions.
# Board nice!nano v2 (compativel com o ProMicro nRF52840 clone).
# ZMK migrou pro Zephyr 4.1: o board virou "nice_nano//zmk" (era nice_nano_v2).
include:
  # Teste isolado do joystick (validado)
  - board: nice_nano//zmk
    shield: jstest

  # Limpa TODOS os settings (pareamento/bonds inclusive). Gravar quando uma
  # placa for trocada: a split casa por endereco BLE unico do chip, entao
  # metade pareada com dongle antigo NUNCA aceita o novo (ela faz advertising
  # DIRECIONADO pro endereco velho). Gravar isto -> ligar 1x -> regravar o
  # firmware normal.
  - board: nice_nano//zmk
    shield: settings_reset

  # --- Teclado split com DONGLE ---
  # O DONGLE e o central: roda o keymap, conecta no PC por USB, leva o Studio.
  # >>> TEMPORARIO: log USB (DEFERRED, sem immediate!) pra cacar a degradacao
  # com o tempo (suspeita: pool LVGL esgotando aos poucos). Nivel do LVGL ja e
  # WARN por default -> so alocacao falhada/erro aparece. Depois volta studio.
  - board: nice_nano//zmk
    shield: splitkb_dongle
    snippet: zmk-usb-logging

  # As duas metades sao perifericas (sem Studio, sem USB pro host).
  - board: nice_nano//zmk
    shield: splitkb_left
  - board: nice_nano//zmk
    shield: splitkb_right
