# Matriz de builds do GitHub Actions.
# Board nice!nano v2 (compativel com o ProMicro nRF52840 clone).
# ZMK migrou pro Zephyr 4.1: o board virou "nice_nano//zmk" (era nice_nano_v2).
include:
  # Teste isolado do joystick (validado)
  - board: nice_nano//zmk
    shield: jstest

  # --- Teclado split com DONGLE ---
  # O DONGLE e o central: roda o keymap, conecta no PC por USB, leva o Studio.
  # >>> TEMPORARIO: log USB no dongle pra diagnosticar o travamento na tecla
  # &bootloader (o central e quem trava; o log dele mostra qual passo falha).
  - board: nice_nano//zmk
    shield: splitkb_dongle
    snippet: zmk-usb-logging

  # As duas metades sao perifericas (sem Studio, sem USB pro host).
  # >>> TEMPORARIO: log USB na ESQUERDA pra diagnosticar a tecla &bootloader
  # (nao entra em bootloader / nao monta o NICENANO). Depois remover o snippet.
  - board: nice_nano//zmk
    shield: splitkb_left
    snippet: zmk-usb-logging
  - board: nice_nano//zmk
    shield: splitkb_right
