# Config exclusiva do DONGLE (Zephyr aplica <shield>.conf do diretorio do shield).
#
# Mantido ENXUTO de proposito, alinhado com os modulos de referencia
# (carrefinho/prospector-zmk-module e englmaxi/zmk-dongle-display):
# nada de log em producao, memorias nos valores de referencia (ver
# Kconfig.defconfig), animacoes dimensionadas pra banda do SPI.

# BATERIA DESLIGADA: o dongle e alimentado por USB e NAO tem bateria. O overlay
# do board nice!nano define `vbatt` (zmk,battery-nrf-vddh) incondicionalmente,
# e o dongle TRAVAVA na 2a amostragem dos 60s (comprovado por log: parava seco
# em 00:01:00.5). A implementacao do evento de bateria de periferico que some
# junto com esta flag e fornecida no dongle_status_screen.c (ZMK_EVENT_IMPL).
CONFIG_ZMK_BATTERY_REPORTING=n

# Busca a bateria das METADES (perifericos) pra tela. As metades ja enviam
# sozinhas -- nada a mudar nelas. (Mesma config dos modulos de referencia.)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Studio SEM trava: por padrao re-trava ao desconectar e apos 10min parado --
# era por isso que a opcao de salvar sumia. Teclado pessoal, trava = atrito.
CONFIG_ZMK_STUDIO_LOCKING=n

# >>> TROCAR PARA 2 QUANDO A METADE DIREITA FOR MONTADA <<<
# Com slots configurados > perifericos existentes, o central escaneia BLE pra
# sempre atras de uma metade que nao existe (central.c so para o scan com
# todos os slots conectados).
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Pilha da thread que escreve comandos pro periferico via GATT (default 512,
# apertado). Nao foi a causa do bug do &bootloader, mas 2048 e barato e da
# margem real pra escrita GATT.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048

# NAO adicionar aqui (ja testados e revertidos durante o debug de 2026-07-18):
#  - CONFIG_LOG_MODE_IMMEDIATE=y  -> distorce timing; com LVGL log afoga o boot
#  - CONFIG_LV_USE_LOG=y          -> so com log deferred, e so pra diagnostico
#  - stack do display 8192 / pool 32KB -> nao resolveram; referencia usa 4096/16KB
