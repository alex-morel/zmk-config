# Config exclusiva do DONGLE (Zephyr aplica <shield>.conf do diretorio do shield).
#
# BATERIA DESLIGADA: o dongle e alimentado por USB e NAO tem bateria. O overlay
# do board nice!nano define `vbatt` (zmk,battery-nrf-vddh) incondicionalmente e
# o ZMK implica ZMK_BATTERY_REPORTING a partir do ZMK_BLE, entao o dongle ficava
# amostrando uma bateria inexistente a cada 60s (CONFIG_ZMK_BATTERY_REPORT_INTERVAL).
#
# Sintoma que isso causava: o dongle TRAVAVA exatamente na 2a amostragem
# (log parava seco em 00:01:00.5, sem nenhuma desconexao registrada, com a porta
# USB ainda enumerada) -- o teclado parecia "perder conexao" e so voltava
# resetando o dongle. As metades nao travam porque nelas a bateria existe.
CONFIG_ZMK_BATTERY_REPORTING=n

# Busca a bateria das METADES (perifericos) pra mostrar na tela do dongle.
# Gera o evento zmk_peripheral_battery_state_changed (com .source = indice do
# periferico). As metades ja mandam sozinhas -- nada a mudar nelas.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Studio SEM trava: por padrao o ZMK exige &studio_unlock pra editar, e ainda
# re-trava sozinho ao desconectar (LOCK_ON_DISCONNECT=y) e a cada 10min parado
# (LOCK_IDLE_TIMEOUT_SEC=600) -- por isso a opcao de salvar sumia. A trava
# serve pra impedir que alguem com acesso fisico remapeie o teclado; num
# teclado pessoal e so atrito. Com isto o Studio fica sempre editavel.
CONFIG_ZMK_STUDIO_LOCKING=n

# >>> TROCAR PARA 2 QUANDO A METADE DIREITA FOR MONTADA <<<
# O central so PARA de escanear quando todos os slots estao conectados
# (central.c: "If all the devices are connected, there is no need to scan").
# Com 2 configurados e so 1 existindo, o slot vazio deixa o dongle escaneando
# BLE PARA SEMPRE atras de uma metade que nao existe -- radio ligado o tempo
# todo competindo com a conexao da metade que existe.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Pilha da thread que ESCREVE comandos pro periferico (GATT). O padrao do ZMK
# e 512 bytes -- pouco demais pra uma escrita GATT, cuja pilha do Bluetooth
# sozinha ja consome mais. Sintoma do estouro: o dongle TRAVA em silencio
# (sem log, sem reboot) e a metade cai depois com reason 0x08 (supervision
# timeout). So se manifesta ao usar behavior com locality EVENT_SOURCE -- no
# nosso caso, a tecla &bootloader, unica que percorre esse caminho.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048

# Pilha da thread do DISPLAY: 4096 (default do nosso Kconfig) e marginal pra
# renderizacao LVGL v9 em 240x240 com montserrat_48. Estouro esporadico
# corrompe a RAM vizinha -> listras brancas intermitentes no boot, glitch nas
# trocas de camada, e morte subita sem fault logo apos "layer state 1" (vista
# nos dois logs do dongle -- o &bootloader nem chegava a ser processado).
# RAM estatica estava em 74.6%: ha folga pros +4KB.
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# (LV_USE_LOG foi testado e REVERTIDO: com log imediato, o LVGL loga cada
# operacao de desenho sincronamente -- milhares de linhas por frame da
# animacao de boot -> o dongle nem parecia bootar. Nao repetir a combinacao.)

# TEMPORARIO (diagnostico do travamento no &bootloader): log IMEDIATO.
# O logging padrao do Zephyr e deferred (fila + thread que descarrega); quando
# o dongle morre, as mensagens enfileiradas dos ultimos ~10ms se perdem -- que
# e exatamente onde esta a causa. Com immediate, cada linha sai sincrona: a
# ultima linha impressa = ultima instrucao executada. REMOVER depois (e lento).
CONFIG_LOG_MODE_IMMEDIATE=y
