# Pointing device / HID de mouse
CONFIG_ZMK_POINTING=y

# Subsistema de input + ADC + driver analogico do joystick
CONFIG_INPUT=y
CONFIG_ADC=y
CONFIG_ANALOG_INPUT=y

# CRITICO: usar a config de canais ADC do devicetree (mapeia X->AIN0, Y->AIN5).
# Sem isso o driver faz input_positive = AIN0 + channel_id, entao o Y cairia
# em AIN1 (pino errado / solto) -> cursor foge sozinho. Este flag corrige.
CONFIG_ANALOG_INPUT_USE_DTS_ADC_CH_CFG=y

# (Log de diagnostico removido — era so pra achar o problema do mapeamento.
#  Pra reativar: snippet "zmk-usb-logging" no build.yaml +
#  CONFIG_ANALOG_INPUT_LOG_DBG_RAW=y + CONFIG_ANALOG_INPUT_LOG_LEVEL_DBG=y)
