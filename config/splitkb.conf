# Display OLED
CONFIG_ZMK_DISPLAY=y

# Pointing / mouse (joysticks) + driver analogico
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_ADC=y
CONFIG_ANALOG_INPUT=y
# CRITICO: usa a config de canais ADC do devicetree (X->AIN0, Y->AIN5).
CONFIG_ANALOG_INPUT_USE_DTS_ADC_CH_CFG=y

# Widget de label do LVGL. Necessario pro dongle (tela custom usa lv_label);
# nas metades (canvas) fica so compilado e nao atrapalha. Aqui no .conf porque
# em Kconfig.defconfig dava erro de tipo por ordem de parse.
CONFIG_LV_OBJ_LABEL=y

# Split BLE — ativado via Kconfig.defconfig (ZMK_SPLIT).
# Sleep pra economizar bateria (opcional, ajuste o timeout):
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
